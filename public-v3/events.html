<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icarus · Event Choices</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=7">
</head>
<body>
<div class="app">
  <div class="console">

    <div class="rail">
      <a class="rail-brand" href="index.html" title="Icarus"><span class="rail-mark"></span><span class="rail-word">ICARUS</span></a>
      <div class="rail-pills" id="rail-pills"></div>
      <div class="dev" id="dev-cluster">
        <button class="dev-btn" id="dev-tempt" type="button">TEMPT:OFF</button>
        <button class="dev-btn" id="dev-burn" type="button">BURN:OFF</button>
        <button class="dev-btn" id="dev-loop" type="button">LOOP:1</button>
        <button class="dev-btn" id="dev-finish" type="button">FINISH:OFF</button>
      </div>
      <div class="rail-toggles"><button class="tog" id="logout-btn" type="button">LOGOUT</button></div>
    </div>

    <div class="mockbar" id="mockbar"><span class="x"></span>OFFLINE · backend not reached. Run <code>python main.py</code> and reload to go live.</div>

    <div class="tabs">
      <a class="tab" href="index.html">DASHBOARD</a>
      <a class="tab" href="setup.html">SETUP</a>
      <a class="tab" href="help.html">HELP</a>
      <a class="tab" href="accounts.html">ACCOUNTS</a>
      <a class="tab" href="diag.html">DIAG / AI</a>
      <a class="tab" href="history.html">CAREER HISTORY</a>
      <div class="tab-spacer"></div>
      <div class="tab-live is-idle" id="tab-live"><span class="dot"></span><span id="tab-live-text">IDLE</span></div>
    </div>

    <div class="subhead">
      <span class="subhead-title">EVENT CHOICES</span>
      <button class="seg is-active" data-cat="Story" type="button">STORY · <span id="ev-c-story">0</span></button>
      <button class="seg" data-cat="Support" type="button">SUPPORT CARD · <span id="ev-c-support">0</span></button>
      <button class="seg" data-cat="Scenario" type="button">SCENARIO · <span id="ev-c-scenario">0</span></button>
      <div class="subhead-spacer"></div>
      <span class="col-meta c-cyan" id="ev-ovr">0 overrides active</span>
      <button class="abtn danger" id="ev-clear" type="button">CLEAR ALL OVERRIDES</button>
    </div>

    <div class="cols">
      <div class="col bordered" style="flex:1">
        <div class="search"><span class="ic">⌕</span><input type="text" id="ev-search" placeholder="search events"></div>
        <div class="thead" style="grid-template-columns:64px 1fr 130px 110px">
          <span>ID</span><span>EVENT</span><span>SEEN CHOICE</span><span class="r">MODE</span>
        </div>
        <div class="col scroll" id="ev-list" style="flex:1"></div>
      </div>
      <div class="col" style="width:430px;flex-shrink:0">
        <div class="col-head"><span class="col-title">EVENT DETAIL</span></div>
        <div id="ev-detail" style="padding:16px"></div>
      </div>
    </div>

    <div class="monitor">
      <div class="monitor-head"><span class="monitor-tag"><span class="dot"></span>MONITOR</span><div class="tab-spacer"></div><span class="monitor-meta" id="monitor-meta">events</span></div>
    </div>

  </div>
</div>
<script src="core.js?v=11"></script>
<script src="events.js?v=5"></script>
</body>
</html>
