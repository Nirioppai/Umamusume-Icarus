<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icarus · Career History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=7">
</head>
<body>
<div class="app">
  <div class="console">

    <!-- STATUS RAIL -->
    <div class="rail">
      <a class="rail-brand" href="index.html" title="Icarus"><span class="rail-mark"></span><span class="rail-word">ICARUS</span></a>
      <div class="rail-pills" id="rail-pills"></div>
      <div class="dev" id="dev-cluster">
        <button class="dev-btn" id="dev-tempt" type="button">TEMPT:OFF</button>
        <button class="dev-btn" id="dev-burn" type="button">BURN:OFF</button>
        <button class="dev-btn" id="dev-loop" type="button">LOOP:1</button>
        <button class="dev-btn" id="dev-finish" type="button">FINISH:OFF</button>
      </div>
      <div class="rail-toggles"><button class="tog" id="logout-btn" type="button">LOGOUT</button></div>
    </div>

    <div class="mockbar" id="mockbar"><span class="x"></span>OFFLINE · backend not reached. Run <code>python main.py</code> and reload to go live.</div>

    <!-- TAB STRIP -->
    <div class="tabs">
      <a class="tab" href="index.html">DASHBOARD</a>
      <a class="tab" href="setup.html">SETUP</a>
      <a class="tab" href="help.html">HELP</a>
      <a class="tab" href="accounts.html">ACCOUNTS</a>
      <a class="tab" href="diag.html">DIAG / AI</a>
      <a class="tab is-active" href="history.html">CAREER HISTORY</a>
      <div class="tab-spacer"></div>
      <div class="tab-live is-idle" id="tab-live"><span class="dot"></span><span id="tab-live-text">IDLE</span></div>
    </div>

    <!-- BODY -->
    <div class="cols">
      <!-- LEFT: completed careers -->
      <div class="col bordered" style="width:330px;flex-shrink:0">
        <div class="col-head"><span class="col-title">COMPLETED CAREERS</span><span class="col-meta" id="ch-count">—</span></div>
        <div class="search"><span class="ic">⌕</span><input type="text" placeholder="filter careers" id="ch-filter"></div>
        <div class="col scroll" id="ch-list" style="flex:1"></div>
      </div>

      <!-- CENTER: career profile -->
      <div class="col bordered" style="flex:1;min-width:0" id="ch-report"></div>
    </div>

    <!-- MONITOR -->
    <div class="monitor">
      <div class="monitor-head">
        <span class="monitor-tag"><span class="dot"></span>MONITOR</span>
        <div class="tab-spacer"></div>
        <span class="monitor-meta" id="monitor-meta">history · session archive</span>
      </div>
    </div>

  </div>
</div>
<script src="core.js?v=10"></script>
<script src="history.js?v=4"></script>
</body>
</html>
