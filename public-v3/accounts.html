<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icarus · Accounts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=16">
</head>
<body>
<div class="app">
  <div class="console">

    <div class="rail">
      <a class="rail-brand" href="index.html" title="Icarus"><span class="rail-mark"></span><span class="rail-word">ICARUS</span></a>
      <div class="rail-pills" id="rail-pills"></div>
      <div class="dev" id="dev-cluster">
        <button class="dev-btn" id="dev-tempt" type="button">TEMPT:OFF</button>
        <button class="dev-btn" id="dev-burn" type="button">BURN:OFF</button>
        <button class="dev-btn" id="dev-loop" type="button">LOOP:1</button>
        <button class="dev-btn" id="dev-finish" type="button">FINISH:OFF</button>
      </div>
      <div class="rail-toggles"><button class="tog" id="logout-btn" type="button">LOGOUT</button></div>
    </div>

    <div class="mockbar" id="mockbar"><span class="x"></span>OFFLINE · backend not reached. Run <code>python main.py</code> and reload to go live.</div>

    <div class="tabs">
      <a class="tab" href="index.html">DASHBOARD</a>
      <a class="tab" href="setup.html">SETUP</a>
      <a class="tab" href="help.html">HELP</a>
      <a class="tab is-active" href="accounts.html">ACCOUNTS</a>
      <a class="tab" href="diag.html">DIAG / AI</a>
      <a class="tab" href="history.html">CAREER HISTORY</a>
      <div class="tab-spacer"></div>
      <div class="tab-live is-idle" id="tab-live"><span class="dot"></span><span id="tab-live-text">IDLE</span></div>
    </div>

    <div class="subhead">
      <span class="subhead-title">MULTI-ACCOUNT MANAGER</span>
      <div class="subhead-spacer"></div>
      <button class="abtn" id="acc-add" type="button">+ ADD ACCOUNT</button>
      <button class="abtn green" id="acc-start" type="button">START MANAGER</button>
    </div>

    <div class="kpis" id="acc-kpis" style="grid-template-columns:repeat(4,1fr)"></div>

    <div class="thead" style="grid-template-columns:44px 1fr 90px 130px 70px 90px 150px">
      <span></span><span>ACCOUNT</span><span>PORT</span><span>STATUS</span><span class="r">RUNS</span><span class="r">FANS</span><span class="r">CONTROL</span>
    </div>
    <div id="acc-rows"></div>

    <div class="monitor">
      <div class="monitor-head"><span class="monitor-log-title">SUPERVISOR LOG</span><span class="col-meta" style="margin-left:8px" id="acc-pid">manager idle</span></div>
      <div class="monitor-rows" id="acc-log"></div>
    </div>

  </div>
</div>
<script src="core.js?v=18"></script>
<script src="accounts.js?v=4"></script>
</body>
</html>
